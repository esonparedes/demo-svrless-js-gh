name: esonparedes/demo-svrless-js
on:
  push:
  workflow_dispatch:
concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:12
    timeout-minutes: 60
    env:
      AWS_REGION: us-east-1
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - run: npm install
    - run: npm test
  production:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: node:12
    if: github.ref == 'refs/heads/master'
    environment: production
    timeout-minutes: 60
    env:
      AWS_REGION: us-east-1
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - run: FAILURE_MESSAGE="Must define \$AWS_ACCESS_KEY_ID and \$AWS_SECRET_ACCESS_KEY. Add keys to ${{ github.server_url }}/${{ github.repository }}/-/settings/ci_cd"
    - run: test -z "$AWS_SECRET_ACCESS_KEY" && echo $FAILURE_MESSAGE && exit 1
    - run: test -z "$AWS_ACCESS_KEY_ID" && echo $FAILURE_MESSAGE && exit 1
    - run: npm install
    - run: npm run deploy -- --stage production --verbose
    - uses: actions/upload-artifact@v4.1.0
      if: success()
      with:
        name: "${{ github.job }}"
        retention-days: 14
        path: stack.json
  postdeploy_test:
    needs: production
    runs-on: ubuntu-latest
    container:
      image: node:12
    if: github.ref == 'refs/heads/master'
    timeout-minutes: 60
    env:
      AWS_REGION: us-east-1
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - uses: actions/download-artifact@v4.1.0
    - run: npm install
    - run: STACK_JSON_FILE=./stack.json npm test featureTests
  pages:
    needs: postdeploy_test
    runs-on: ubuntu-latest
    container:
      image: node:12
    if: github.ref == 'refs/heads/master'
    environment: production_pages
    timeout-minutes: 60
    env:
      AWS_REGION: us-east-1
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - uses: actions/download-artifact@v4.1.0
    - run: cp stack.json ./public/stack.json
    - uses: actions/upload-artifact@v4.1.0
      if: success()
      with:
        name: "${{ github.job }}"
        path: "./public/"
    - uses: JamesIves/github-pages-deploy-action@v4.5.0
      with:
        branch: gh-pages
        folder: public
